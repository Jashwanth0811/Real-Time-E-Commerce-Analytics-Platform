ecommerce_dw:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DB_HOST', 'localhost') }}"
      port: "{{ env_var('DB_PORT', '5432') | int }}"
      user: "{{ env_var('DB_USER', 'warehouse') }}"
      password: "{{ env_var('DB_PASSWORD', 'warehouse123') }}"
      dbname: ecommerce_dw
      schema: silver
      threads: 4
      connect_timeout: 10
    prod:
      type: postgres
      host: "{{ env_var('PROD_DB_HOST') }}"
      port: "{{ env_var('PROD_DB_PORT', '5432') | int }}"
      user: "{{ env_var('PROD_DB_USER') }}"
      password: "{{ env_var('PROD_DB_PASSWORD') }}"
      dbname: ecommerce_dw
      schema: silver
      threads: 8
